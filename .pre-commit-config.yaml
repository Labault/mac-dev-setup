default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x]
        files: ^(scripts/.*\.sh|install\.sh)$

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: system
        types: [markdown]

      - id: lychee
        name: lychee
        entry: lychee
        language: system
        pass_filenames: false
        args:
          - --exclude
          - 'https://claude\.ai'
          # bootstrap-web-setup is a private repo: anonymous CI requests 404.
          - --exclude
          - 'github\.com/Labault/bootstrap-web-setup'
          - README.md
          - docs/**/*.md

      - id: editorconfig-checker
        name: editorconfig-checker
        entry: editorconfig-checker
        language: system
        pass_filenames: false

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false

      - id: commit-msg-lint
        name: commit-msg-lint
        entry: scripts/lint-commit-msg.sh
        language: script
        stages: [commit-msg]
