name: Bug report
description: Report a reproducible problem with the setup or documentation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please provide enough detail to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Describe what happened and what you expected instead.
      placeholder: Explain the problem clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the commands or actions that trigger the problem.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste logs, errors, or command output without secrets or personal data.
      render: shell

  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple Silicon
        - Intel
        - Unknown
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.5"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, related files, or other useful information.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed secrets and personal information from the report.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
