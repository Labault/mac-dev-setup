name: macOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node dependencies
        env:
          HUSKY: "0"
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('profiles/**/Brewfile') }}

      - name: Ensure Homebrew
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "Homebrew not found (unexpected on macOS runner)"
            exit 1
          fi
          brew update
          brew analytics off

      - name: Normalize Homebrew runner state
        run: |
          # GitHub-hosted macOS runners can ship stale taps, broken cache links,
          # and deprecated kegs unrelated to this repository's Brewfiles.
          brew cleanup --prune=all || true
          brew untap homebrew/core homebrew/cask || true
          brew untap aws/tap azure/bicep hashicorp/tap || true
          brew uninstall --ignore-dependencies openssl@1.1 || true

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Verify setup CLI contract
        run: bash scripts/cli.sh setup --profile minimal --dry-run

      - name: Install full profile
        run: brew bundle --file=profiles/full/Brewfile

      - name: Apply setup once
        run: CI=true bash scripts/setup.sh --profile full

      - name: Verify setup and hardening
        run: bash scripts/verify.sh
