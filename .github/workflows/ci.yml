name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Repository quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install system validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

          npm install --global markdownlint-cli2

          go install \
            github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@latest

          curl -sSfL \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash

          sudo install actionlint /usr/local/bin/actionlint

          sudo snap install lychee

      - name: Add Go binaries to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: >-
            pre-commit-${{ runner.os }}-${{
            hashFiles('.pre-commit-config.yaml') }}

      - name: Run repository quality checks
        run: pre-commit run --all-files --show-diff-on-failure
