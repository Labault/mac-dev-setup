name: MacDevSetup CI (fast)

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Cache Homebrew
      # ----------------------------
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('profiles/**/Brewfile') }}

      # ----------------------------
      # Ensure Homebrew
      # ----------------------------
      - name: Ensure Homebrew
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

      # ----------------------------
      # Optimize brew
      # ----------------------------
      - name: Optimize brew
        run: |
          brew update
          brew analytics off

      # ----------------------------
      # Install profile Brewfile
      # ----------------------------
      - name: Install full profile
        run: brew bundle --file=profiles/full/Brewfile

      # ----------------------------
      # Verify (always after install)
      # ----------------------------
      - name: Verify setup
        run: bash scripts/verify.sh

      # ----------------------------
      # Hardening (after verify)
      # ----------------------------
      - name: Run hardening checks
        run: bash scripts/hardening.sh
