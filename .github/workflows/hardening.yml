name: Hardening Gate

on:
  push:
  pull_request:

jobs:
  hardening:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Homebrew
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "Homebrew not found on macOS runner"
            exit 1
          fi

      - name: Run hardening checks
        run: bash scripts/hardening.sh
