<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">MacDevSetup CLI architecture</title>
  <desc id="desc">The mac symlink runs scripts/cli.sh, which uses scripts/lib helpers and dispatches to scripts/commands. mac setup runs scripts/setup.sh, which calls brew.sh (reads a profile Brewfile), git.sh (applies configs/git/.gitconfig), and zsh.sh (applies configs/zsh files).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="800" height="470" fill="#ffffff"/>

  <!-- mac symlink -->
  <rect x="290" y="20" width="220" height="44" rx="9" fill="#fff3e6" stroke="#e08a3c" stroke-width="1.5"/>
  <text x="400" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">~/.local/bin/mac (symlink)</text>
  <line x1="400" y1="64" x2="400" y2="90" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- cli.sh + lib -->
  <rect x="300" y="90" width="200" height="46" rx="9" fill="#e6f0ff" stroke="#3b74d6" stroke-width="1.6"/>
  <text x="400" y="118" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f2937">scripts/cli.sh</text>

  <rect x="560" y="89" width="220" height="48" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.5"/>
  <text x="670" y="109" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">scripts/lib/</text>
  <text x="670" y="126" text-anchor="middle" font-size="10.5" fill="#6b7280">registry · discovery · logging · profiles</text>
  <line x1="500" y1="113" x2="558" y2="113" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="529" y="105" text-anchor="middle" font-size="10" fill="#6b7280">uses</text>

  <line x1="400" y1="136" x2="400" y2="162" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- commands -->
  <rect x="220" y="162" width="360" height="58" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="400" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">scripts/commands/*.sh</text>
  <text x="400" y="205" text-anchor="middle" font-size="10.5" fill="#4b5563">setup · doctor · update · uninstall · php · defaults · keyboard · vscode</text>

  <line x1="400" y1="220" x2="400" y2="248" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="455" y="240" text-anchor="middle" font-size="10.5" fill="#6b7280">mac setup runs</text>

  <!-- setup.sh -->
  <rect x="300" y="248" width="200" height="44" rx="9" fill="#e6f0ff" stroke="#3b74d6" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">scripts/setup.sh</text>

  <!-- branches to brew/git/zsh -->
  <line x1="400" y1="292" x2="170" y2="330" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="400" y1="292" x2="400" y2="330" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="400" y1="292" x2="630" y2="330" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="90" y="330" width="160" height="42" rx="9" fill="#eef2f7" stroke="#6b7280" stroke-width="1.4"/>
  <text x="170" y="356" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">brew.sh</text>
  <rect x="320" y="330" width="160" height="42" rx="9" fill="#eef2f7" stroke="#6b7280" stroke-width="1.4"/>
  <text x="400" y="356" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">git.sh</text>
  <rect x="550" y="330" width="160" height="42" rx="9" fill="#eef2f7" stroke="#6b7280" stroke-width="1.4"/>
  <text x="630" y="356" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">zsh.sh</text>

  <line x1="170" y1="372" x2="170" y2="400" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="400" y1="372" x2="400" y2="400" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="630" y1="372" x2="630" y2="400" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="70" y="400" width="200" height="44" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.4"/>
  <text x="170" y="421" text-anchor="middle" font-size="11" fill="#1f2937">profiles/&lt;name&gt;/Brewfile</text>
  <text x="170" y="436" text-anchor="middle" font-size="10" fill="#6b7280">Homebrew packages</text>
  <rect x="300" y="400" width="200" height="44" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.4"/>
  <text x="400" y="421" text-anchor="middle" font-size="11" fill="#1f2937">configs/git/.gitconfig</text>
  <text x="400" y="436" text-anchor="middle" font-size="10" fill="#6b7280">managed git include</text>
  <rect x="530" y="400" width="200" height="44" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.4"/>
  <text x="630" y="421" text-anchor="middle" font-size="11" fill="#1f2937">configs/zsh/*</text>
  <text x="630" y="436" text-anchor="middle" font-size="10" fill="#6b7280">managed shell config</text>
</svg>
