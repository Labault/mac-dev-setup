<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">mac command discovery flow</title>
  <desc id="desc">Executable scripts in scripts/commands are scanned by command_registry.sh, which uses command_metadata.sh to read leading-comment metadata. command_discovery.sh is a thin layer over the registry, and cli.sh consumes it for help, lookup, suggestions, and execution. The registry also feeds generate-zsh-completion.sh, which writes configs/zsh/completions/_mac.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="390" fill="#ffffff"/>

  <!-- commands -->
  <rect x="180" y="20" width="240" height="46" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="300" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">scripts/commands/*.sh</text>
  <line x1="300" y1="66" x2="300" y2="92" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- metadata feeds registry -->
  <rect x="500" y="96" width="240" height="58" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.5"/>
  <text x="620" y="120" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">command_metadata.sh</text>
  <text x="620" y="139" text-anchor="middle" font-size="11" fill="#6b7280">reads leading-comment metadata</text>
  <line x1="500" y1="125" x2="452" y2="125" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- registry (core) -->
  <rect x="150" y="96" width="300" height="58" rx="9" fill="#e6f0ff" stroke="#3b74d6" stroke-width="1.6"/>
  <text x="300" y="120" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f2937">command_registry.sh</text>
  <text x="300" y="139" text-anchor="middle" font-size="11" fill="#4b5563">builds records: name⇥path⇥description</text>
  <line x1="300" y1="154" x2="300" y2="182" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- discovery -->
  <rect x="170" y="182" width="260" height="52" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="300" y="204" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">command_discovery.sh</text>
  <text x="300" y="222" text-anchor="middle" font-size="11" fill="#6b7280">thin layer: command_exists · script_path</text>
  <line x1="300" y1="234" x2="300" y2="262" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- cli -->
  <rect x="200" y="262" width="200" height="46" rx="9" fill="#fff3e6" stroke="#e08a3c" stroke-width="1.5"/>
  <text x="300" y="290" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f2937">scripts/cli.sh</text>
  <text x="300" y="330" text-anchor="middle" font-size="11.5" fill="#4b5563">mac help · command lookup · suggestions · execute</text>

  <!-- registry feeds completion generator -->
  <line x1="450" y1="140" x2="505" y2="210" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="500" y="210" width="240" height="46" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.5"/>
  <text x="620" y="238" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">generate-zsh-completion.sh</text>
  <line x1="620" y1="256" x2="620" y2="284" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="500" y="284" width="240" height="44" rx="9" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.5"/>
  <text x="620" y="311" text-anchor="middle" font-size="12" fill="#1f2937">configs/zsh/completions/_mac</text>
</svg>
