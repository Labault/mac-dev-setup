<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 450" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">MacDevSetup system overview</title>
  <desc id="desc">install.sh sets up the mac CLI, which exposes setup, doctor, update, and uninstall commands. mac setup installs Homebrew packages from a profile Brewfile, applies managed Zsh and Git configuration, and backs up any replaced files.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="820" height="450" fill="#ffffff"/>

  <!-- install.sh -->
  <rect x="160" y="22" width="500" height="64" rx="10" fill="#fff3e6" stroke="#e08a3c" stroke-width="1.5"/>
  <text x="410" y="48" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">install.sh — curl | bash</text>
  <text x="410" y="70" text-anchor="middle" font-size="12" fill="#4b5563">clones to ~/.mac-dev-setup · links `mac` into ~/.local/bin · updates PATH</text>

  <line x1="410" y1="86" x2="410" y2="106" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- mac CLI -->
  <rect x="320" y="106" width="180" height="46" rx="10" fill="#e6f0ff" stroke="#3b74d6" stroke-width="1.5"/>
  <text x="410" y="134" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">the mac CLI</text>

  <!-- branch lines to commands -->
  <line x1="410" y1="152" x2="125" y2="198" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="410" y1="152" x2="325" y2="198" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="410" y1="152" x2="515" y2="198" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="410" y1="152" x2="705" y2="198" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- command boxes -->
  <rect x="40" y="200" width="170" height="44" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="125" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">mac setup</text>

  <rect x="240" y="200" width="170" height="44" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="325" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">mac doctor</text>

  <rect x="430" y="200" width="170" height="44" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="515" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">mac update</text>

  <rect x="620" y="200" width="170" height="44" rx="9" fill="#e9f6ec" stroke="#3fa45e" stroke-width="1.5"/>
  <text x="705" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">mac uninstall</text>

  <!-- command captions -->
  <text x="325" y="264" text-anchor="middle" font-size="11" fill="#6b7280">checks machine vs profile</text>
  <text x="515" y="264" text-anchor="middle" font-size="11" fill="#6b7280">git fast-forward update</text>
  <text x="705" y="264" text-anchor="middle" font-size="11" fill="#6b7280">reverses managed changes</text>

  <!-- setup -> applies -->
  <line x1="125" y1="244" x2="125" y2="300" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- what setup applies -->
  <rect x="40" y="300" width="740" height="126" rx="10" fill="#f4f5f7" stroke="#8a8f98" stroke-width="1.5"/>
  <text x="62" y="326" font-size="14" font-weight="700" fill="#1f2937">mac setup applies:</text>
  <text x="62" y="352" font-size="13" fill="#374151">• Homebrew packages — profiles/&lt;name&gt;/Brewfile (minimal or full)</text>
  <text x="62" y="378" font-size="13" fill="#374151">• Managed Zsh and Git config — ~/.zshrc, ~/.zprofile, global git include</text>
  <text x="62" y="404" font-size="13" fill="#374151">• Backups of replaced files — ~/Documents/Backups/mac-dev-setup</text>
</svg>
